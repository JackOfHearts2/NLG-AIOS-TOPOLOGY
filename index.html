<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NLG-AIOS Topology, Project Dawn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D10; --surface:#12161A; --surface-2:#181D22;
    --gold:#D4AF37; --gold-dim:#7A6220; --cyan:#4FD1C5;
    --violet:#A78BFA; --violet-dim:#2B2440;
    --text:#F1F4F6; --text-2:#B9C2C8; --text-3:#8B969D;
    --green:#5FD98A; --green-dim:#1E3A2B;
    --amber:#F2B84B; --amber-dim:#4A3B1E;
    --gray:#9AA4AB; --gray-dim:#2A2F33;
    --border:#232A30;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
    --serif:"Space Grotesk","Segoe UI",sans-serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);font-family:var(--sans);}
  /* Themed scrollbars everywhere: dark track, dim thumb, gold on hover */
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--gray-dim);border-radius:5px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}
  *{scrollbar-width:thin;scrollbar-color:#2A2F33 #0A0D10;}
  /* One centered container: all content positions relative to this, never the raw screen edge */
  #app{position:relative;z-index:1;width:100%;max-width:1500px;margin:0 auto;padding:0 48px;
    min-height:100vh;display:flex;flex-direction:column;}
  @media (max-width:900px){ #app{padding:0 20px;} }
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--border) 1px, transparent 1px),linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:38px 38px;opacity:.18;}
  /* Full-page ambient canvas: drifting constellation + grid pulses, behind all content */
  #bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;}
  header{padding:16px 0 4px;flex:none;position:relative;z-index:1;}
  .eyebrow{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin:0 0 6px;}
  h1{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--text);margin:0;letter-spacing:.01em;}
  .sub{font-family:var(--sans);font-size:13px;color:var(--text-3);margin:6px 0 0;letter-spacing:.02em;}
  #stage{flex:none;height:min(74vh,760px);min-height:440px;position:relative;transition:filter .4s ease;overflow:hidden;}
  #stage.dimmed{filter:blur(3px) brightness(.55);}
  /* Fixed, centered map canvas filling its section; the tightened viewBox makes the diagram dominate it */
  svg#map{position:absolute;inset:10px 0;width:100%;height:calc(100% - 20px);overflow:visible;}
  .node{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .25s cubic-bezier(.2,.8,.2,1);}
  .node:hover, .node:focus{transform:translateY(-4px) scale(1.22);outline:none;}
  .node rect{transition:filter .2s ease, stroke-width .2s ease;}
  .node:hover rect, .node:focus rect{filter:brightness(1.45) drop-shadow(0 0 18px currentColor);stroke-width:2;}
  .hub-group{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .25s cubic-bezier(.2,.8,.2,1);}
  .hub-group:hover, .hub-group:focus{transform:scale(1.08);outline:none;}
  .hub-glow{filter:drop-shadow(0 0 22px rgba(212,175,55,.4));}
  .spoke-line{stroke:var(--border);stroke-width:1;
    transition:stroke .25s ease, stroke-width .25s ease, filter .25s ease;}
  .spoke-line.lit{stroke-width:2.5;filter:drop-shadow(0 0 6px currentColor);}
  .map-footer{position:absolute;left:0;right:0;bottom:14px;display:flex;flex-wrap:wrap;
    justify-content:space-between;align-items:center;gap:6px 16px;z-index:1;pointer-events:none;}
  .legend{display:flex;flex-wrap:wrap;gap:12px 16px;font-family:var(--sans);font-size:12px;color:var(--text-2);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .hint{font-family:var(--sans);font-size:12px;color:var(--text-3);white-space:nowrap;}

  .milestone-rail{position:absolute;top:110px;bottom:60px;display:flex;flex-direction:column;justify-content:space-evenly;
    z-index:1;width:clamp(200px, 19vw, 264px);pointer-events:none;}
  .milestone-rail.left{left:0;} .milestone-rail.right{right:0;}
  .milestone-card{background:rgba(24,29,34,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(212,175,55,.22);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;
    transition:border-color .2s ease, transform .2s ease;pointer-events:auto;cursor:pointer;}
  .milestone-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);}
  .milestone-ring{flex:none;}
  .milestone-info{flex:1;min-width:0;}
  .milestone-info .m-label{font-family:var(--sans);font-weight:500;font-size:12px;letter-spacing:.04em;color:var(--text-2);line-height:1.4;margin-bottom:4px;}
  .milestone-info .m-pct{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--text);}
  .milestone-info .m-frac{font-family:var(--sans);font-size:12px;color:var(--text-3);margin-left:4px;}
  @media (max-width:900px){ .milestone-rail{display:none;} }

  /* Milestone side menu: hidden on desktop (rails cover it), slide-out drawer on mobile */
  button.back.menu-btn{display:none;}
  #milestoneMenu{display:none;position:fixed;top:0;right:0;bottom:0;width:min(320px,84vw);background:var(--surface);
    border-left:1px solid var(--gold-dim);z-index:8;transform:translateX(100%);
    transition:transform .35s cubic-bezier(.16,.8,.2,1);padding:24px 20px;overflow-y:auto;}
  #milestoneMenu.open{transform:translateX(0);}
  #milestoneMenu .now-label{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:0 0 14px;}
  #menuScrim{position:fixed;inset:0;background:rgba(5,6,7,.55);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:7;}
  #menuScrim.open{opacity:1;pointer-events:auto;}
  .milestone-menu-track{display:flex;flex-direction:column;gap:12px;}

  /* Mobile accordion rows: status-colored edge + ring, animated expand via grid-template-rows */
  #mobileList{display:none;padding:8px 0 20px;}
  .m-row{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);
    border-radius:0 10px 10px 0;margin-bottom:10px;overflow:hidden;}
  .m-row.m-hub{border-color:var(--gold-dim);box-shadow:0 0 20px rgba(212,175,55,.22);}
  .m-row-head{width:100%;display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--text);
    padding:12px 14px;font-family:var(--sans);font-size:14px;cursor:pointer;text-align:left;}
  .m-ring{flex:none;display:flex;}
  .m-row-name{flex:1;font-weight:600;}
  .m-star{color:var(--gold);}
  .m-row-meta{font-size:12px;flex:none;}
  .m-chev{color:var(--text-2);font-size:18px;flex:none;width:18px;text-align:center;}
  .m-row-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s cubic-bezier(.2,.8,.2,1);padding:0 14px;}
  .m-row.open .m-row-body{grid-template-rows:1fr;padding:0 14px 18px;}
  .m-row-inner{min-height:0;overflow:hidden;}

  /* Connection spine: a gold line descends from the Claude card, each aspect branches off it */
  .m-row.m-hub{margin-bottom:0;}
  .m-spine{display:flex;}
  .m-spine-rail{width:22px;flex:none;display:flex;justify-content:center;}
  .m-spine-line{width:2px;background:var(--gold-dim);}
  .m-spine-rows{flex:1;min-width:0;padding-top:12px;}
  .m-branch{display:flex;align-items:flex-start;margin-bottom:10px;}
  .m-branch-arm{width:16px;height:2px;flex:none;margin-top:28px;border-radius:1px;
    transition:box-shadow .25s ease;}
  .m-branch:has(.m-row.open) .m-branch-arm{box-shadow:0 0 8px currentColor;}
  .m-branch .m-row{flex:1;min-width:0;margin-bottom:0;}

  /* Overall Progress: wide horizontal bar that fills as steps complete, with milestone ticks */
  #progressWrap{flex:none;padding:8px 0 14px;position:relative;z-index:1;cursor:pointer;
    transition:transform .28s cubic-bezier(.2,.8,.2,1), filter .28s ease;}
  #progressWrap:hover, #progressWrap:focus{outline:none;
    transform:translateY(-2px);
    filter:drop-shadow(0 0 18px rgba(212,175,55,.4));}
  .pw-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .pw-label{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.08em;color:var(--gold);}
  .pw-pct{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--text);}
  .pw-track{position:relative;height:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;}
  .pw-fill{position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));
    border-radius:6px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .pw-tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--border);border-radius:1px;}

  .node-pulse{position:absolute;border:2px solid;border-radius:50%;pointer-events:none;
    animation:pulse-out .55s cubic-bezier(.2,.8,.2,1) forwards;}
  @keyframes pulse-out{ from{ transform:scale(.3); opacity:.9; } to{ transform:scale(2.4); opacity:0; } }

  /* Decorative motion: rotating hub ring + breathing glow. Desktop only, disabled under reduced motion. */
  @media (min-width:901px) and (prefers-reduced-motion: no-preference){
    .hub-ring{transform-box:fill-box;transform-origin:center;animation:hub-rotate 36s linear infinite;}
    .hub-glow{animation:hub-breathe 4s ease-in-out infinite alternate;}
  }
  @keyframes hub-rotate{to{transform:rotate(360deg);}}
  @keyframes hub-breathe{
    from{filter:drop-shadow(0 0 20px rgba(212,175,55,.34));}
    to{filter:drop-shadow(0 0 27px rgba(212,175,55,.52));}
  }

  /* Idle layer: chase-light spokes, breathing milestone rings, drifting grid.
     Desktop only, disabled under reduced motion, and gated by the ambient toggle in JS. */
  .bg-grid{transition:background-position .4s ease;}
  @media (min-width:901px) and (prefers-reduced-motion: no-preference){
    body.idle .spoke-line{animation:spoke-chase 12s linear infinite;animation-delay:calc(var(--i,0) * 1.2s);}
    body.idle .milestone-ring{animation:ring-breathe 4s ease-in-out infinite;}
    body.idle .bg-grid{animation:grid-drift 50s ease-in-out infinite alternate;}
  }
  @keyframes spoke-chase{
    0%{stroke:var(--border);filter:none;}
    4%{stroke:var(--gold);filter:drop-shadow(0 0 7px rgba(212,175,55,.85));}
    12%,100%{stroke:var(--border);filter:none;}
  }
  @keyframes ring-breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  @keyframes grid-drift{
    from{background-position:0 0, 0 0;}
    to{background-position:9px 7px, 9px 7px;}
  }
  .ambient-btn{position:absolute;top:64px;right:0;}
  @media (max-width:900px){ button.back.ambient-btn{display:none;} }

  #detail{transition:transform .38s cubic-bezier(.16,.8,.2,1), opacity .3s ease;}
  #detail:not(.open){opacity:0;}
  #detail.open{opacity:1;}


  #overlay{position:fixed;inset:0;background:rgba(5,6,7,.55);opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:2;}
  #overlay.open{opacity:1;pointer-events:auto;}

  #detail{position:fixed;top:0;right:0;bottom:0;width:92%;max-width:760px;background:var(--surface);
    border-left:1px solid var(--gold-dim);transform:translateX(100%);transition:transform .42s cubic-bezier(.16,.8,.2,1);
    overflow-y:auto;z-index:3;padding:30px 34px 60px;}
  #detail.open{transform:translateX(0);}
  #detail .corner{position:absolute;width:22px;height:22px;pointer-events:none;}
  #detail .corner.tl{top:10px;left:10px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}
  #detail .corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}

  /* Hub panel slides from the left, visually distinct from the aspect drawers on the right */
  #detail.from-left{
    left:0;right:auto;
    border-left:none;border-right:1px solid var(--gold-dim);
    transform:translateX(-100%);
  }
  #detail.from-left.open{transform:translateX(0);}
  #detail.from-left .corner.tl{left:auto;right:10px;border-left:none;border-right:1.5px solid var(--gold);}
  #detail.from-left .corner.bl{left:auto;right:10px;border-left:none;border-right:1.5px solid var(--gold);}

  /* Centered "report" style, used by milestone and all-milestones panels instead of the slide-from-right drawer */
  #detail.centered{
    top:50%;left:50%;right:auto;bottom:auto;
    width:min(600px, 92vw);max-width:600px;max-height:80vh;
    border-left:none;border:1px solid var(--gold-dim);border-radius:14px;
    box-shadow:0 30px 70px rgba(0,0,0,.55);
    transform:translate(-50%,-50%) scale(.94);
    transition:transform .32s cubic-bezier(.2,.8,.2,1), opacity .28s ease;
  }
  #detail.centered.open{transform:translate(-50%,-50%) scale(1);}
  #detail.centered .corner{display:none;}

  /* Mobile: every panel variant collapses into one bottom-sheet behavior.
     position:fixed anchors the sheet to the viewport, not the taller scrolling page. */
  @media (max-width:900px){
    #detail, #detail.from-left, #detail.centered{
      position:fixed;
      top:12vh;left:0;right:0;bottom:0;width:100%;max-width:none;max-height:none;
      border:none;border-top:1px solid var(--gold-dim);border-radius:16px 16px 0 0;
      box-shadow:0 -18px 50px rgba(0,0,0,.5);
      transform:translateY(100%);
      transition:transform .38s cubic-bezier(.16,.8,.2,1), opacity .3s ease;
      padding:24px 20px 60px;
    }
    #detail.open, #detail.from-left.open, #detail.centered.open{transform:translateY(0);}
    #detail .corner{display:none;}
  }

  .back{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);
    color:var(--text-2);font-family:var(--sans);font-size:12px;padding:9px 16px;cursor:pointer;margin-bottom:22px;
    letter-spacing:.04em;}
  .back:hover{border-color:var(--gold-dim);color:var(--text);}
  .d-badge{display:inline-block;font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    padding:4px 11px;margin-bottom:12px;border:1px solid currentColor;}
  .d-title{font-family:var(--serif);font-weight:600;font-size:30px;color:var(--text);margin:0 0 18px;}
  .d-row{display:flex;gap:10px;font-family:var(--sans);font-size:13px;color:var(--text-2);margin-bottom:6px;letter-spacing:.02em;}
  .d-row b{color:var(--cyan);font-weight:600;min-width:110px;display:inline-block;}
  .progress-note{font-family:var(--sans);font-size:12px;color:var(--text-3);margin:0 0 6px;letter-spacing:.01em;}
  .d-section-label{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .purpose{font-size:15px;line-height:1.7;color:var(--text);margin:0;}
  .conn-list{list-style:none;margin:0;padding:0;}
  .conn-list li{position:relative;padding:8px 0 8px 20px;font-size:14px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;}
  .conn-list li:last-child{border-bottom:none;}
  .conn-list li::before{content:"";position:absolute;left:0;top:16px;width:7px;height:7px;background:var(--cyan);border-radius:1px;transform:rotate(45deg);}
  .steps{list-style:none;margin:0;padding:0;counter-reset:step;}
  .steps li{position:relative;padding:12px 0 12px 46px;font-size:15px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.55;}
  .steps li:last-child{border-bottom:none;}
  .steps li::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;left:0;top:12px;
    font-family:var(--mono);font-size:13px;letter-spacing:.05em;}
  .steps li.state-done::before{color:var(--green);}
  .steps li.state-done{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--text-3);}
  .steps li.state-now::before{color:var(--amber);}
  .steps li.state-now{color:var(--text);}
  .steps li.state-later::before{color:var(--text-3);}
  .steps li.state-later{color:var(--text-2);}
  .step-tag{display:inline-block;font-family:var(--sans);font-weight:500;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding:1px 7px;margin-left:8px;border:1px solid currentColor;vertical-align:middle;}
  .step-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
  .step-checkbox{flex:none;width:16px;height:16px;margin-top:2px;accent-color:var(--green);cursor:pointer;}
  .step-text{flex:1;}
  .candidates{list-style:none;margin:0;padding:0;}
  .candidates li{padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);line-height:1.6;}
  .candidates li:last-child{border-bottom:none;}
  .tandem{font-size:14px;color:var(--text-2);line-height:1.65;background:var(--surface-2);border-left:2px solid var(--cyan);
    padding:14px 16px;margin-top:4px;}

  #nowStrip{flex:none;padding:12px 0 16px;border-top:1px solid var(--border);position:relative;z-index:1;background:var(--bg);}
  #nowStrip .now-label{font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin:0 0 12px;}
  /* Desktop: cards wrap in a grid, no scrollbar at all. Mobile restores the swipe track (end of sheet). */
  .now-track{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .now-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--amber);
    border-radius:6px;padding:12px 14px;cursor:pointer;transition:border-color .15s ease;}
  .now-card:hover{border-color:var(--gold-dim);}
  .now-card .nc-title{font-size:12px;font-weight:600;color:var(--gold);font-family:var(--sans);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase;}
  .now-card .nc-text{font-size:13px;color:var(--text);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .now-empty{font-size:13px;color:var(--text-3);}
  .note{font-size:13px;color:var(--text-2);line-height:1.6;background:var(--surface-2);border-left:2px solid var(--amber);
    padding:14px 16px;margin-top:14px;}
  .question-box{border:1px dashed var(--cyan);padding:14px 16px;margin-top:14px;}
  .question-box .q-label{display:block;font-family:var(--sans);font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px;}
  .question-box .q-text{font-size:14px;color:var(--text);line-height:1.5;font-style:italic;}
  .tool-info-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    border:1px solid var(--cyan);color:var(--cyan);background:none;font-family:var(--mono);font-size:10px;
    margin-left:6px;padding:0;line-height:1;cursor:pointer;vertical-align:middle;}
  .tool-info-btn:hover{background:var(--surface-2);}
  .tool-info-btn.proposed{border-color:var(--violet);color:var(--violet);}
  .tool-popover{position:absolute;z-index:6;max-width:290px;margin-top:0;background:var(--surface);
    box-shadow:0 12px 34px rgba(0,0,0,.5);}
  .tool-inline-info{margin-top:10px;}
  .info-btn{position:absolute;top:24px;right:0;}
  .about-btn{position:absolute;top:24px;right:30px;font-family:var(--sans);font-size:12px;letter-spacing:.06em;
    color:var(--text-2);background:none;border:1px solid var(--border);padding:8px 14px;cursor:pointer;z-index:1;}
  .about-btn:hover{border-color:var(--gold-dim);color:var(--text);}
  .about-body{font-size:15px;line-height:1.75;color:var(--text);}
  .about-body p{margin:0 0 16px;}
  .qbox{margin-top:10px;}
  .qbox label{display:block;font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.04em;margin-bottom:8px;}
  .qbox textarea{width:100%;min-height:64px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    font-family:var(--sans);font-size:14px;padding:10px 12px;resize:vertical;}
  .qbox textarea:focus{outline:none;border-color:var(--gold-dim);}
  .qbox .hint2{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:6px;}

  /* Mobile layout block. Kept at the end of the stylesheet on purpose:
     these override desktop base rules of equal specificity, so they must come last. */
  @media (max-width:900px){
    html,body{overflow:auto;height:auto;}
    #app{height:auto;min-height:100vh;}
    #stage{display:none;}
    #mobileList{display:block;}
    #milestoneMenu{display:block;}
    /* Header buttons join normal flow on mobile so they can't overlap the header text */
    .info-btn{position:static;display:inline-flex;margin:14px 8px 0 0;}
    button.back.menu-btn{display:inline-flex;position:static;margin:14px 0 0 0;}
    /* Bottom of the page never clipped: real padding plus the device safe-area inset */
    #nowStrip{padding:16px 0 calc(34px + env(safe-area-inset-bottom));}
    /* Mobile keeps the horizontal swipe track for now-cards */
    .now-track{display:flex;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
    .now-track .now-card{flex:none;width:230px;}
  }

  /* Keyboard focus rings, last in the sheet so they outrank the outline:none focus resets above */
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .node:focus-visible, .hub-group:focus-visible, #progressWrap:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div id="app">

<script>
const HUB = window.NLG_DATA.hub;
const ASPECTS = window.NLG_DATA.aspects;
document.getElementById("lastUpdated").textContent = window.NLG_DATA.lastUpdated || "";

const COLOR = { active:"#5FD98A", research:"#F2B84B", proposed:"#A78BFA", "not-started":"#6B7378" };
const DIM   = { active:"#1E3A2B", research:"#4A3B1E", proposed:"#2B2440", "not-started":"#2A2F33" };
const LABEL = { active:"Active", research:"In Research", proposed:"Proposed", "not-started":"Not Started" };

// ---- Firebase-backed override state: /overrides/{aspectId}/{stepIndex} = true|false ----
let OVERRIDES = {};
let refreshOpenPanel = () => {};
function effectiveDone(id, idx){
  const o = OVERRIDES[id];
  if(o && o[idx] !== undefined) return !!o[idx];
  return stepsFor(id)[idx].state === "done";
}
function toggleStep(id, idx, checked){
  if(!OVERRIDES[id]) OVERRIDES[id] = {};
  OVERRIDES[id][idx] = checked;
  db.ref(`overrides/${id}/${idx}`).set(checked);
  render();
  renderNowStrip();
  renderMilestones();
  renderMobileList();
  refreshOpenPanel();
}

const svg = document.getElementById("map");
const cx=340, cy=330, hubR=65, nodeR=200, boxW=132, boxH=52;
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs){ const e=document.createElementNS(NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

function render(){
  svg.setAttribute("viewBox", "60 90 560 480");
  svg.innerHTML = "";
  const defs = el("defs");
  defs.innerHTML = '<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#232A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>';
  svg.appendChild(defs);

  const spokeLines = {};
  ASPECTS.forEach((a,i)=>{
    const rad = a.angle * Math.PI/180;
    a._cx = cx + nodeR*Math.cos(rad); a._cy = cy + nodeR*Math.sin(rad);
    const hx = cx + hubR*Math.cos(rad), hy = cy + hubR*Math.sin(rad);
    const line = el("line",{x1:hx,y1:hy,x2:a._cx,y2:a._cy,class:"spoke-line","marker-end":"url(#arrow)",style:`--i:${i}`});
    spokeLines[a.id] = line;
    svg.appendChild(line);
  });

  const hub = el("g",{class:"hub-group hub-glow", tabindex:"0", role:"button", "aria-label":"Claude central hub"});
  hub.addEventListener("click",(e)=>{ pulseAt(e.clientX, e.clientY, "#D4AF37"); openHub(); });
  hub.addEventListener("keypress",(e)=>{ if(e.key==="Enter") openHub(); });
  hub.innerHTML = `<circle class="hub-ring" cx="${cx}" cy="${cy}" r="${hubR+16}" fill="none" stroke="var(--gold-dim)" stroke-width="1" stroke-dasharray="3 9"/>
    <circle cx="${cx}" cy="${cy}" r="${hubR}" fill="#181D22" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="600" fill="#F1F4F6" font-family="'Space Grotesk',sans-serif">Claude</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4FD1C5" font-family="'Inter',sans-serif">central hub</text>`;
  svg.appendChild(hub);

  ASPECTS.forEach(a=>{
    const g = el("g",{class:"node", style:`color:${COLOR[a.status]}`, tabindex:"0", role:"button", "aria-label":a.name});
    g.addEventListener("click",(e)=>{ pulseAt(e.clientX, e.clientY, COLOR[a.status]); openDetail(a.id); });
    g.addEventListener("keypress",(e)=>{ if(e.key==="Enter") openDetail(a.id); });
    const litArm = on=>{
      const l = spokeLines[a.id]; if(!l) return;
      l.classList.toggle("lit", on);
      l.style.stroke = on ? COLOR[a.status] : "";
      l.style.color = on ? COLOR[a.status] : "";
    };
    g.addEventListener("mouseenter",()=>litArm(true));
    g.addEventListener("mouseleave",()=>litArm(false));
    g.addEventListener("focus",()=>litArm(true));
    g.addEventListener("blur",()=>litArm(false));
    const x = a._cx-boxW/2, y = a._cy-boxH/2;
    const done = a.steps.filter((s,i)=>effectiveDone(a.id,i)).length;
    const total = a.steps.length;
    g.innerHTML = `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="7" fill="${DIM[a.status]}" stroke="${COLOR[a.status]}" stroke-width="1"/>
      ${a.priority ? `<text x="${x+boxW-11}" y="${y+13}" text-anchor="middle" font-size="11" fill="#D4AF37" aria-label="priority">&#9733;</text>` : ""}
      <text x="${a._cx}" y="${a._cy-10}" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F1F4F6" font-family="'Inter',sans-serif">${a.name}</text>
      <text x="${a._cx}" y="${a._cy+12}" text-anchor="middle" dominant-baseline="central" font-size="12" fill="${COLOR[a.status]}" font-family="'Inter',sans-serif" letter-spacing="0.02em">${LABEL[a.status]} ${done}/${total}</text>`;
    svg.appendChild(g);
  });
}

// ---- Tool info popovers: plain-language blurbs for tools that aren't common knowledge ----
// (QuickBooks and Claude intentionally have no entry.)
const TOOL_INFO = {
  "Meta Business Suite":"Facebook and Instagram's free control panel for business accounts. One place to post, schedule, read messages, and run ads across both apps.",
  "SuperProfile":"A tool that adds a link-in-bio page and automatic Instagram DM replies (AutoDM) on top of an Instagram Business account.",
  "Buffini Referral Maker CRM":"A real estate CRM from Buffini & Company built around referral-based selling. It tracks relationships and prompts regular follow-ups with past clients and contacts.",
  "Buildium":"Property management software. Holds leases, rent collection, maintenance requests, and owner reports for rental portfolios.",
  "Stessa":"A free tool for rental property investors that tracks income, expenses, and returns per property, built for smaller portfolios.",
  "Dotloop":"Real estate transaction management. E-signatures, document storage, and a compliance checklist for every deal, priced for small brokerages.",
  "Quo":"A business phone system with a built-in AI voice agent that answers calls 24/7, texts, and transcribes and summarizes every call. Formerly OpenPhone.",
  "Notion":"A flexible workspace for notes, databases, and dashboards. Already the planned knowledge base, so trackers and KPI views live where the docs already are.",
  "SyndicationPro":"Real estate syndication software. An investor CRM, capital-raise workflows, and an investor portal, sized for small and mid-size sponsors.",
  "Buildertrend":"Residential construction project management. Scheduling, budgets, client portals, and change orders, with unlimited users on a flat monthly price."
};
function toolLine(toolStr){
  const proposed = toolStr.startsWith("Proposed:");
  let html = toolStr;
  for(const name in TOOL_INFO){
    if(html.includes(name)) html = html.replace(name, `${name}<button class="tool-info-btn${proposed ? " proposed" : ""}" data-tool="${name}" aria-label="What is ${name}?">i</button>`);
  }
  if(proposed) html = `<span style="color:var(--violet);font-weight:600">Proposed:</span>` + html.slice(9);
  return html;
}
let toolPopEl = null, toolPopTimer = null;
function closeToolPopover(){
  clearTimeout(toolPopTimer);
  if(toolPopEl){ toolPopEl.remove(); toolPopEl = null; }
}
function openToolPopover(btn){
  const name = btn.dataset.tool;
  if(toolPopEl && toolPopEl.dataset.tool === name) return;
  closeToolPopover();
  const inner = `<span class="q-label">${name}</span><span class="q-text">${TOOL_INFO[name]}</span>`;
  if(window.matchMedia("(max-width:900px)").matches){
    const box = document.createElement("div");
    box.className = "question-box tool-inline-info";
    box.dataset.tool = name;
    box.innerHTML = inner;
    btn.closest(".d-row").after(box);
    toolPopEl = box;
  } else {
    const detail = document.getElementById("detail");
    const pop = document.createElement("div");
    pop.className = "question-box tool-popover";
    pop.dataset.tool = name;
    pop.innerHTML = inner;
    detail.appendChild(pop);
    const br = btn.getBoundingClientRect(), dr = detail.getBoundingClientRect();
    pop.style.left = Math.max(12, Math.min(br.left - dr.left, detail.clientWidth - 310)) + "px";
    pop.style.top = (br.bottom - dr.top + detail.scrollTop + 8) + "px";
    toolPopEl = pop;
  }
}
document.addEventListener("click", e=>{
  const btn = e.target.closest(".tool-info-btn");
  if(btn){
    const wasOpen = toolPopEl && toolPopEl.dataset.tool === btn.dataset.tool;
    wasOpen ? closeToolPopover() : openToolPopover(btn);
    return;
  }
  if(toolPopEl && !e.target.closest(".tool-popover, .tool-inline-info")) closeToolPopover();
});
// Desktop: hovering the icon opens the blurb; it closes when the pointer leaves both icon and popover
document.addEventListener("mouseover", e=>{
  if(!window.matchMedia("(min-width:901px)").matches) return;
  const btn = e.target.closest(".tool-info-btn");
  if(btn){ clearTimeout(toolPopTimer); openToolPopover(btn); return; }
  if(e.target.closest(".tool-popover")) clearTimeout(toolPopTimer);
});
document.addEventListener("mouseout", e=>{
  if(!window.matchMedia("(min-width:901px)").matches || !toolPopEl) return;
  const from = e.target.closest(".tool-info-btn, .tool-popover");
  if(!from) return;
  const to = e.relatedTarget && e.relatedTarget.closest ? e.relatedTarget.closest(".tool-info-btn, .tool-popover") : null;
  if(to) return;
  clearTimeout(toolPopTimer);
  toolPopTimer = setTimeout(closeToolPopover, 250);
});

function connList(arr){ return `<ul class="conn-list">${arr.map(c=>`<li>${c}</li>`).join("")}</ul>`; }
function stepList(arr, id){
  const tagText = {done:"Done", now:"In Progress", later:"Later"};
  return `<ol class="steps">${arr.map((s,i)=>{
    const done = effectiveDone(id, i);
    const label = done ? "done" : (s.state==="now" ? "now" : "later");
    return `<li class="state-${label}">
      <label class="step-row">
        <input type="checkbox" class="step-checkbox" ${done?"checked":""} onchange="toggleStep('${id}', ${i}, this.checked)">
        <span class="step-text">${s.text}</span>
      </label>
      <span class="step-tag">${tagText[label]}</span>
    </li>`;
  }).join("")}</ol>`;
}
function questionBox(q){ return q ? `<div class="question-box"><span class="q-label">Open Question</span><span class="q-text">${q}</span></div>` : ""; }
function bridgeRow(v){
  if(!v) return "";
  const undecided = v === "Not yet determined";
  return `<div class="d-row" style="margin-top:14px${undecided ? ";color:var(--text-3);font-style:italic" : ""}"><b>Bridge Workflow</b>${v}</div>`;
}
function joinNames(names){
  if(names.length <= 1) return names.join("");
  if(names.length === 2) return names[0]+" and "+names[1];
  return names.slice(0,-1).join(", ")+", and "+names[names.length-1];
}
function optionsList(arr){ return arr ? `<p class="d-section-label">Candidate tools</p><ul class="candidates">${arr.map(o=>`<li>${o}</li>`).join("")}</ul>` : ""; }
function tandemBox(t){ return t ? `<p class="d-section-label">How they would work in tandem</p><div class="tandem">${t}</div>` : ""; }

function openInfo(){
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:#4FD1C5;border-color:#4FD1C5">Reference</span>
    <h2 class="d-title">About this map</h2>
    <p class="purpose">This shows how the AI side of the business connects together. Claude sits at the center as the coordinating point. Each spoke around it represents one function of the business, marketing, finance, brokerage, property management, and so on.</p>
    <p class="d-section-label">Reading the colors</p>
    <ul class="conn-list">
      <li>Green: active and running today</li>
      <li>Amber: tool confirmed in use, connection still being worked out</li>
      <li>Violet: candidate tools proposed, nothing chosen or started yet</li>
      <li>Gray: not started, no candidates identified yet</li>
    </ul>
    <p class="d-section-label">Reading a node</p>
    <ul class="conn-list">
      <li>Purpose: what this piece is meant to do</li>
      <li>Candidate tools: real options under consideration, with trade-offs, where nothing is decided yet</li>
      <li>How they would work in tandem: the chain of handoffs between tools and Claude</li>
      <li>Connections needed: what has to be linked or authorized for it to work</li>
      <li>Setup steps: the literal sequence to get there, each tagged done, in progress, or later</li>
      <li>Open question: a spot where the actual answer is still needed</li>
    </ul>
    <p class="d-section-label">Reading the progress numbers</p>
    <p class="purpose">The overall bar at the top includes every aspect. The milestone breakdown only covers the aspects currently being actively tracked as priorities, not yet-started catch-all groupings like Future AI.</p>
    <p class="d-section-label">Feedback</p>
    <p class="purpose">If something here does not match how a process actually works day to day, or a tool is missing, that is exactly the kind of correction this map needs.</p>
  `;
  document.getElementById("detail").classList.remove("centered","from-left");
  document.getElementById("detail").classList.add("open");
  closeToolPopover();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
}

function hubBodyHTML(){
  return `
    <span class="d-badge" style="color:${COLOR[HUB.status]};border-color:${COLOR[HUB.status]}">${LABEL[HUB.status]}</span>
    <h2 class="d-title">${HUB.name}</h2>
    <div class="d-row"><b>Tool</b><span>${toolLine(HUB.tool)}</span></div>
    <p class="d-section-label">Purpose</p>
    <p class="purpose">${HUB.purpose}</p>
    <p class="d-section-label">Connections needed</p>
    ${connList(HUB.connections)}
    ${bridgeRow(HUB.bridgeWorkflow)}
    <p class="d-section-label">Setup steps</p>
    ${stepList(HUB.steps, "__hub__")}
    ${HUB.note ? `<p class="d-section-label">Note</p><div class="note">${HUB.note}</div>` : ""}
    ${questionBox(HUB.question)}
  `;
}

function aspectBodyHTML(a){
  return `
    <span class="d-badge" style="color:${COLOR[a.status]};border-color:${COLOR[a.status]}">${LABEL[a.status]}</span>
    ${a.priority ? `<span class="d-badge" style="color:var(--gold);border-color:var(--gold);margin-left:8px">&#9733; Priority</span>` : ""}
    <h2 class="d-title">${a.name}</h2>
    <div class="d-row"><b>Tool</b><span>${toolLine(a.tool)}</span></div>
    <p class="d-section-label">Purpose</p>
    <p class="purpose">${a.purpose}</p>
    ${optionsList(a.options)}
    ${tandemBox(a.tandem)}
    <p class="d-section-label">Connections needed</p>
    ${connList(a.connections)}
    ${bridgeRow(a.bridgeWorkflow)}
    <p class="d-section-label">Setup steps</p>
    ${stepList(a.steps, a.id)}
    ${a.note ? `<p class="d-section-label">Note</p><div class="note">${a.note}</div>` : ""}
    ${questionBox(a.question)}
  `;
}

function isMobile(){ return window.matchMedia("(max-width:900px)").matches; }

function openHub(){
  if(isMobile()){ expandMobileRow("__hub__"); return; }
  document.getElementById("detailBody").innerHTML = hubBodyHTML();
  document.getElementById("detail").classList.remove("centered");
  document.getElementById("detail").classList.add("from-left");
  document.getElementById("detail").classList.add("open");
  closeToolPopover();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
  refreshOpenPanel = openHub;
}

function openDetail(id){
  if(isMobile()){ expandMobileRow(id); return; }
  const a = ASPECTS.find(x=>x.id===id);
  document.getElementById("detailBody").innerHTML = aspectBodyHTML(a);
  document.getElementById("detail").classList.remove("centered","from-left");
  document.getElementById("detail").classList.add("open");
  closeToolPopover();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
  refreshOpenPanel = () => openDetail(id);
}
function closeDetail(){
  closeToolPopover();
  document.getElementById("detail").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("stage").classList.remove("dimmed");
}

function renderNowStrip(){
  const track = document.getElementById("nowTrack");
  const items = [];
  HUB.steps.forEach((s,i)=>{ if(s.state==="now" && !effectiveDone("__hub__",i)) items.push({label:"Claude", text:s.text, action:()=>openHub()}); });
  ASPECTS.forEach(a=>{
    a.steps.forEach((s,i)=>{ if(s.state==="now" && !effectiveDone(a.id,i)) items.push({label:a.name, text:s.text, action:()=>openDetail(a.id)}); });
  });
  if(items.length === 0){
    track.innerHTML = `<p class="now-empty">Nothing actively in progress right now.</p>`;
    return;
  }
  track.innerHTML = "";
  items.forEach(it=>{
    const card = document.createElement("div");
    card.className = "now-card";
    card.innerHTML = `<div class="nc-title">${it.label}</div><div class="nc-text">${it.text}</div>`;
    card.addEventListener("click", it.action);
    track.appendChild(card);
  });
}

// ---- Milestones: grouped rollups of the same done/now/later step data ----
const MILESTONES = [
  { label:"Foundation", ids:["__hub__","marketing"] },
  { label:"Financial Operations", ids:["finance"] },
  { label:"Client & Brokerage Systems", ids:["brokerage","clientexp"] },
  { label:"Internal Operations", ids:["propmgmt","hr","legal"] },
  { label:"Executive Visibility", ids:["executive"] },
  { label:"Investment & Portfolio Growth", ids:["investment"] },
];
function stepsFor(id){ return id === "__hub__" ? HUB.steps : ASPECTS.find(a=>a.id===id).steps; }
function tallyIds(ids){
  let done=0, total=0;
  ids.forEach(id=>{ const steps = stepsFor(id); total += steps.length; done += steps.filter((s,i)=>effectiveDone(id,i)).length; });
  return {done, total};
}
function ringSVG(pct, colorVar, size=52){
  const half = size/2, sw = size >= 52 ? 4 : 3, r = half - sw - 2;
  const c = 2*Math.PI*r;
  const offset = c * (1 - pct/100);
  return `<svg class="milestone-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${half}" cy="${half}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
    <circle class="ring-fill" cx="${half}" cy="${half}" r="${r}" fill="none" stroke="${colorVar}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
      transform="rotate(-90 ${half} ${half})" data-target="${offset}"/>
  </svg>`;
}
function milestoneCardHTML(m, idx){
  const {done,total} = tallyIds(m.ids);
  const pct = total ? Math.round((done/total)*100) : 0;
  return `<div class="milestone-card" onclick="openMilestone(${idx})">
    ${ringSVG(pct, "var(--gold)")}
    <div class="milestone-info">
      <div class="m-label">${m.label}</div>
      <span class="m-pct">${pct}%</span><span class="m-frac">${done}/${total}</span>
    </div>
  </div>`;
}
function openMilestone(idx){
  toggleMilestoneMenu(false);
  const m = MILESTONES[idx];
  const {done,total} = tallyIds(m.ids);
  const pct = total ? Math.round((done/total)*100) : 0;
  const sections = m.ids.map(id=>{
    if(id === "__hub__") return {id, name:HUB.name, statusLabel:LABEL[HUB.status], steps:HUB.steps, action:"openHub()"};
    const a = ASPECTS.find(x=>x.id===id);
    return {id, name:a.name, statusLabel:LABEL[a.status], steps:a.steps, action:`openDetail('${a.id}')`};
  });
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:var(--cyan);border-color:var(--cyan)">Milestone</span>
    <h2 class="d-title">${m.label}</h2>
    <div class="d-row"><b>Progress</b>${pct}% &middot; ${done}/${total} steps done</div>
    <p class="progress-note">${done} of ${total} steps marked done, across ${joinNames(sections.map(s=>s.name))}.</p>
    ${sections.map(s=>`
      <p class="d-section-label" style="cursor:pointer" onclick="${s.action}">${s.name} &middot; ${s.statusLabel}</p>
      ${stepList(s.steps, s.id)}
    `).join("")}
  `;
  document.getElementById("detail").classList.remove("from-left");
  document.getElementById("detail").classList.add("centered");
  document.getElementById("detail").classList.add("open");
  closeToolPopover();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
  refreshOpenPanel = () => openMilestone(idx);
}
function openAllMilestones(){
  const rows = MILESTONES.map((m,idx)=>{
    const {done,total} = tallyIds(m.ids);
    const pct = total ? Math.round((done/total)*100) : 0;
    return {label:m.label, pct, done, total, idx};
  });
  const overallDone = rows.reduce((sum,r)=>sum+r.done,0);
  const overallTotal = rows.reduce((sum,r)=>sum+r.total,0);
  const overallPct = overallTotal ? Math.round((overallDone/overallTotal)*100) : 0;
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:var(--cyan);border-color:var(--cyan)">Overview</span>
    <h2 class="d-title">All milestones</h2>
    <div class="d-row"><b>Overall</b>${overallPct}% &middot; ${overallDone}/${overallTotal} steps done</div>
    <p class="progress-note">${overallDone} of ${overallTotal} steps marked done, across every aspect and Claude's own setup.</p>
    <p class="d-section-label">Milestones</p>
    <ul class="conn-list">${rows.map(r=>`<li style="cursor:pointer" onclick="openMilestone(${r.idx})">${r.label} &middot; ${r.pct}% (${r.done}/${r.total})</li>`).join("")}</ul>
  `;
  document.getElementById("detail").classList.remove("from-left");
  document.getElementById("detail").classList.add("centered");
  document.getElementById("detail").classList.add("open");
  closeToolPopover();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
  refreshOpenPanel = openAllMilestones;
}
function animateRingsAndCounters(container){
  container.querySelectorAll(".ring-fill").forEach(ring=>{
    const target = parseFloat(ring.dataset.target);
    requestAnimationFrame(()=>{ ring.style.transition = "stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"; ring.style.strokeDashoffset = target; });
  });
}
function renderMilestones(){
  const leftIdx = [0,1,2], rightIdx = [3,4,5];
  document.getElementById("railLeft").innerHTML = leftIdx.map(i=>milestoneCardHTML(MILESTONES[i], i)).join("");
  document.getElementById("railRight").innerHTML = rightIdx.map(i=>milestoneCardHTML(MILESTONES[i], i)).join("");
  document.getElementById("milestoneTrack").innerHTML = MILESTONES.map((m,i)=>milestoneCardHTML(m,i)).join("");
  animateRingsAndCounters(document.getElementById("railLeft"));
  animateRingsAndCounters(document.getElementById("railRight"));
  animateRingsAndCounters(document.getElementById("milestoneTrack"));

  let done=0, total=0;
  [["__hub__",HUB.steps], ...ASPECTS.map(a=>[a.id,a.steps])].forEach(([id,steps])=>{ total+=steps.length; done+=steps.filter((s,i)=>effectiveDone(id,i)).length; });
  const overallPct = total ? Math.round((done/total)*100) : 0;
  requestAnimationFrame(()=>{ document.getElementById("opFill").style.width = overallPct+"%"; });
  // Milestone boundary ticks along the bar, tooltip shows each milestone's own progress
  let cum = 0;
  document.getElementById("pwTicks").innerHTML = MILESTONES.map(m=>{
    const t = tallyIds(m.ids);
    cum += t.total;
    const pctHere = t.total ? Math.round((t.done/t.total)*100) : 0;
    return `<span class="pw-tick" style="left:${(cum/total*100).toFixed(1)}%" title="${m.label}: ${pctHere}% (${t.done}/${t.total})"></span>`;
  }).join("");
  let shown=0;
  const counter = setInterval(()=>{
    shown = Math.min(shown+2, overallPct);
    document.getElementById("opPct").textContent = shown+"%";
    if(shown>=overallPct) clearInterval(counter);
  }, 20);
}

// ---- Node click pulse: a small burst right where the click happened ----
function pulseAt(clientX, clientY, color){
  const stage = document.getElementById("stage");
  const rect = stage.getBoundingClientRect();
  const p = document.createElement("div");
  p.className = "node-pulse";
  p.style.left = (clientX-rect.left-22)+"px";
  p.style.top = (clientY-rect.top-22)+"px";
  p.style.width = "44px"; p.style.height = "44px";
  p.style.borderColor = color;
  stage.appendChild(p);
  setTimeout(()=>p.remove(), 600);
}

// ---- Mobile spine: Claude card on top, a gold line descending from it, every aspect row branching off ----
// Bodies are always in the DOM (collapsed via grid-template-rows) so toggling
// is a class flip that animates, not a re-render that snaps.
const mobileOpen = new Set();
function mobileRowHTML(id, item){
  const status = item.status;
  const done = item.steps.filter((s,i)=>effectiveDone(id,i)).length;
  const pct = item.steps.length ? Math.round((done/item.steps.length)*100) : 0;
  const open = mobileOpen.has(id);
  return `<div class="m-row ${id==="__hub__" ? "m-hub" : ""} ${open ? "open" : ""}" id="mrow-${id}" style="border-left:3px solid ${id==="__hub__" ? "var(--gold)" : COLOR[status]}">
    <button class="m-row-head" onclick="toggleMobileRow('${id}')" aria-expanded="${open}">
      <span class="m-ring">${ringSVG(pct, id==="__hub__" ? "var(--gold)" : COLOR[status], 34)}</span>
      <span class="m-row-name">${item.name}${item.priority ? ' <span class="m-star">&#9733;</span>' : ""}</span>
      <span class="m-row-meta" style="color:${COLOR[status]}">${LABEL[status]} &middot; ${done}/${item.steps.length}</span>
      <span class="m-chev">${open ? "&minus;" : "+"}</span>
    </button>
    <div class="m-row-body"><div class="m-row-inner">${id==="__hub__" ? hubBodyHTML() : aspectBodyHTML(item)}</div></div>
  </div>`;
}
function renderMobileList(){
  const list = document.getElementById("mobileList");
  if(!list) return;
  const branches = ASPECTS.map(a=>
    `<div class="m-branch">
      <div class="m-branch-arm" style="background:${COLOR[a.status]};color:${COLOR[a.status]}"></div>
      ${mobileRowHTML(a.id, a)}
    </div>`).join("");
  list.innerHTML = mobileRowHTML("__hub__", HUB) +
    `<div class="m-spine">
      <div class="m-spine-rail"><div class="m-spine-line"></div></div>
      <div class="m-spine-rows">${branches}</div>
    </div>`;
  animateRingsAndCounters(list);
}
function toggleMobileRow(id){
  const willOpen = !mobileOpen.has(id);
  willOpen ? mobileOpen.add(id) : mobileOpen.delete(id);
  const row = document.getElementById("mrow-"+id);
  if(!row){ renderMobileList(); return; }
  row.classList.toggle("open", willOpen);
  row.querySelector(".m-row-head").setAttribute("aria-expanded", willOpen);
  row.querySelector(".m-chev").innerHTML = willOpen ? "&minus;" : "+";
}
function expandMobileRow(id){
  if(!mobileOpen.has(id)) toggleMobileRow(id);
  const el = document.getElementById("mrow-"+id);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
}

// ---- Milestone side menu (mobile) ----
function toggleMilestoneMenu(open){
  document.getElementById("milestoneMenu").classList.toggle("open", open);
  document.getElementById("menuScrim").classList.toggle("open", open);
}

// ---- Full-page background canvas: drifting constellation + grid pulses ----
// Always-on (unlike the mouse-idle layer), disabled under reduced motion.
// Constellation runs on mobile too (denser per-area so ~25 dots on a phone); grid pulses stay desktop-only.
(function bgfx(){
  const canvas = document.getElementById("bgfx");
  const ctx = canvas.getContext("2d");
  const wideQ = window.matchMedia("(min-width:901px)");
  const reducedQ = window.matchMedia("(prefers-reduced-motion: reduce)");
  const GRID = 38, LINK = 115;
  let dots = [], pulses = [], W = 0, H = 0, cleared = true;
  function active(){ return !reducedQ.matches; }
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    const n = Math.round((W * H) / (wideQ.matches ? 26000 : 12000));
    dots = Array.from({length:n}, ()=>({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
      r: 1 + Math.random()*1.4,
      gold: Math.random() < .5
    }));
    pulses = [];
  }
  window.addEventListener("resize", resize);
  resize();
  function spawnPulse(){
    const vertical = Math.random() < .5;
    const lineCount = Math.floor((vertical ? W : H) / GRID);
    pulses.push({
      vertical,
      line: (1 + Math.floor(Math.random()*lineCount)) * GRID,
      pos: -140,
      speed: 1.8 + Math.random()*1.8,
      len: 70 + Math.random()*60
    });
  }
  function frame(){
    requestAnimationFrame(frame);
    if(!active()){
      if(!cleared){ ctx.clearRect(0,0,W,H); cleared = true; }
      return;
    }
    cleared = false;
    ctx.clearRect(0,0,W,H);
    // Constellation: slow drift with edge wrap, linked when close
    for(const d of dots){
      d.x += d.vx; d.y += d.vy;
      if(d.x < 0) d.x += W; if(d.x > W) d.x -= W;
      if(d.y < 0) d.y += H; if(d.y > H) d.y -= H;
    }
    ctx.lineWidth = 1;
    for(let i=0; i<dots.length; i++){
      for(let j=i+1; j<dots.length; j++){
        const a = dots[i], b = dots[j];
        const dist = Math.hypot(a.x-b.x, a.y-b.y);
        if(dist < LINK){
          ctx.strokeStyle = `rgba(212,175,55,${(1 - dist/LINK) * .16})`;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    for(const d of dots){
      ctx.fillStyle = d.gold ? "rgba(212,175,55,.4)" : "rgba(79,209,197,.35)";
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    }
    // Grid pulses: thin light traveling along the background grid lines (desktop only)
    if(wideQ.matches && pulses.length < 3 && Math.random() < .012) spawnPulse();
    pulses = pulses.filter(p => p.pos < (p.vertical ? H : W) + p.len);
    for(const p of pulses){
      p.pos += p.speed;
      const grad = p.vertical
        ? ctx.createLinearGradient(p.line, p.pos, p.line, p.pos + p.len)
        : ctx.createLinearGradient(p.pos, p.line, p.pos + p.len, p.line);
      grad.addColorStop(0, "rgba(79,209,197,0)");
      grad.addColorStop(.5, "rgba(79,209,197,.35)");
      grad.addColorStop(1, "rgba(79,209,197,0)");
      ctx.strokeStyle = grad;
      ctx.beginPath();
      if(p.vertical){ ctx.moveTo(p.line, p.pos); ctx.lineTo(p.line, p.pos + p.len); }
      else { ctx.moveTo(p.pos, p.line); ctx.lineTo(p.pos + p.len, p.line); }
      ctx.stroke();
    }
  }
  frame();
})();

// ---- Ambient/idle motion layer: desktop only, off under reduced motion, user-toggleable ----
let ambientOn = localStorage.getItem("ambientMotion") !== "off";
function motionOK(){
  return window.matchMedia("(min-width:901px)").matches
    && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
}
let idleTimer = null;
function resetIdle(){
  document.body.classList.remove("idle");
  clearTimeout(idleTimer);
  if(ambientOn && motionOK()) idleTimer = setTimeout(()=>document.body.classList.add("idle"), 5000);
}
["mousemove","mousedown","keydown","wheel","touchstart"].forEach(ev=>
  document.addEventListener(ev, resetIdle, {passive:true}));
resetIdle();
function updateAmbientBtn(){
  const b = document.getElementById("ambientToggle");
  if(b) b.textContent = "Ambient Motion: " + (ambientOn ? "On" : "Off");
}
function toggleAmbient(){
  ambientOn = !ambientOn;
  localStorage.setItem("ambientMotion", ambientOn ? "on" : "off");
  resetIdle();
  updateAmbientBtn();
}
updateAmbientBtn();

db.ref("overrides").on("value", snapshot=>{
  OVERRIDES = snapshot.val() || {};
  render();
  renderNowStrip();
  renderMilestones();
  renderMobileList();
  refreshOpenPanel();
});
</script>
