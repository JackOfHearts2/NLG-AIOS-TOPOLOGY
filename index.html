<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>NLG-AIOS Topology, Project Dawn</title>
<style>
  :root{
    --bg:#0A0D10; --surface:#12161A; --surface-2:#181D22;
    --gold:#D4AF37; --gold-dim:#7A6220; --cyan:#4FD1C5;
    --text:#E8ECEE; --text-2:#9AA4AA; --text-3:#5C666B;
    --green:#5FD98A; --green-dim:#1E3A2B;
    --amber:#F2B84B; --amber-dim:#4A3B1E;
    --gray:#6B7378; --gray-dim:#2A2F33;
    --border:#232A30;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);overflow:hidden;font-family:var(--sans);}
  #app{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;}
  .bg-grid{position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--border) 1px, transparent 1px),linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:38px 38px;opacity:.18;}
  header{padding:22px 30px 6px;flex:none;position:relative;z-index:1;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin:0 0 6px;}
  h1{font-family:var(--serif);font-weight:400;font-size:24px;color:var(--text);margin:0;letter-spacing:.01em;}
  .sub{font-family:var(--mono);font-size:12px;color:var(--text-3);margin:6px 0 0;letter-spacing:.02em;}
  #stage{flex:1;position:relative;transition:filter .4s ease;min-height:0;overflow:hidden;cursor:grab;touch-action:none;}
  #stage.panning{cursor:grabbing;}
  #stage.dimmed{filter:blur(3px) brightness(.55);}
  svg#map{position:absolute;top:0;left:0;width:680px;height:660px;transform-origin:0 0;}
  .node{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .22s cubic-bezier(.2,.8,.2,1);}
  .node:hover, .node:focus{transform:scale(1.08);outline:none;}
  .node rect{transition:filter .2s ease, stroke-width .2s ease;}
  .node:hover rect, .node:focus rect{filter:brightness(1.35) drop-shadow(0 0 10px currentColor);stroke-width:1.6;}
  .hub-group{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .22s cubic-bezier(.2,.8,.2,1);}
  .hub-group:hover, .hub-group:focus{transform:scale(1.05);outline:none;}
  .hub-glow{filter:drop-shadow(0 0 22px rgba(212,175,55,.4));}
  .spoke-line{stroke:var(--border);stroke-width:1;}
  .map-footer{position:absolute;left:0;right:0;bottom:14px;padding:0 24px;display:flex;flex-wrap:wrap;
    justify-content:space-between;align-items:center;gap:6px 16px;z-index:1;pointer-events:none;}
  .legend{display:flex;flex-wrap:wrap;gap:12px 16px;font-family:var(--mono);font-size:11px;color:var(--text-2);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .hint{font-family:var(--mono);font-size:11px;color:var(--text-3);white-space:nowrap;}
  .reset-view{position:absolute;right:20px;top:16px;z-index:1;background:var(--surface);border:1px solid var(--border);
    color:var(--text-2);font-family:var(--mono);font-size:11px;padding:8px 14px;border-radius:20px;cursor:pointer;pointer-events:auto;}
  .reset-view:hover{border-color:var(--gold-dim);color:var(--text);}

  .milestone-rail{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px;z-index:1;width:186px;pointer-events:none;}
  .milestone-rail.left{left:22px;} .milestone-rail.right{right:22px;}
  .milestone-card{background:rgba(24,29,34,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(212,175,55,.22);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;
    transition:border-color .2s ease, transform .2s ease;pointer-events:auto;}
  .milestone-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);}
  .milestone-ring{flex:none;}
  .milestone-info{flex:1;min-width:0;}
  .milestone-info .m-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--text-2);line-height:1.35;margin-bottom:3px;}
  .milestone-info .m-pct{font-family:var(--serif);font-size:18px;color:var(--text);}
  .milestone-info .m-frac{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-left:4px;}
  @media (max-width:920px){ .milestone-rail{display:none;} }

  #milestoneStrip{display:none;flex:none;padding:14px 30px 0;}
  @media (max-width:920px){ #milestoneStrip{display:block;} }
  #milestoneStrip .now-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
  .milestone-track{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .milestone-track .milestone-card{flex:none;width:210px;}

  .overall-progress{display:flex;align-items:center;gap:10px;margin-top:8px;}
  .overall-progress .op-track{width:200px;max-width:40vw;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
  .overall-progress .op-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));
    border-radius:3px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .overall-progress .op-pct{font-family:var(--mono);font-size:12px;color:var(--gold);min-width:36px;}

  .node-pulse{position:absolute;border:2px solid;border-radius:50%;pointer-events:none;
    animation:pulse-out .55s cubic-bezier(.2,.8,.2,1) forwards;}
  @keyframes pulse-out{ from{ transform:scale(.3); opacity:.9; } to{ transform:scale(2.4); opacity:0; } }

  #detail{transition:transform .38s cubic-bezier(.16,.8,.2,1), opacity .3s ease;}
  #detail:not(.open){opacity:0;}
  #detail.open{opacity:1;}


  #overlay{position:absolute;inset:0;background:rgba(5,6,7,.55);opacity:0;pointer-events:none;transition:opacity .35s ease;z-index:2;}
  #overlay.open{opacity:1;pointer-events:auto;}

  #detail{position:absolute;top:0;right:0;bottom:0;width:92%;max-width:760px;background:var(--surface);
    border-left:1px solid var(--gold-dim);transform:translateX(100%);transition:transform .42s cubic-bezier(.16,.8,.2,1);
    overflow-y:auto;z-index:3;padding:30px 34px 60px;}
  #detail.open{transform:translateX(0);}
  #detail .corner{position:absolute;width:22px;height:22px;pointer-events:none;}
  #detail .corner.tl{top:10px;left:10px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}
  #detail .corner.bl{bottom:10px;left:10px;border-bottom:1.5px solid var(--gold);border-left:1.5px solid var(--gold);}

  .back{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);
    color:var(--text-2);font-family:var(--mono);font-size:12px;padding:9px 16px;cursor:pointer;margin-bottom:22px;
    letter-spacing:.04em;}
  .back:hover{border-color:var(--gold-dim);color:var(--text);}
  .d-badge{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:4px 11px;margin-bottom:12px;border:1px solid currentColor;}
  .d-title{font-family:var(--serif);font-size:30px;color:var(--text);margin:0 0 18px;}
  .d-row{display:flex;gap:10px;font-family:var(--mono);font-size:12px;color:var(--text-3);margin-bottom:6px;letter-spacing:.02em;}
  .d-row b{color:var(--cyan);font-weight:400;min-width:110px;display:inline-block;}
  .d-section-label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    margin:30px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .purpose{font-size:15px;line-height:1.7;color:var(--text);margin:0;}
  .conn-list{list-style:none;margin:0;padding:0;}
  .conn-list li{position:relative;padding:8px 0 8px 20px;font-size:14px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;}
  .conn-list li:last-child{border-bottom:none;}
  .conn-list li::before{content:"";position:absolute;left:0;top:16px;width:7px;height:7px;background:var(--cyan);border-radius:1px;transform:rotate(45deg);}
  .steps{list-style:none;margin:0;padding:0;counter-reset:step;}
  .steps li{position:relative;padding:12px 0 12px 46px;font-size:15px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.55;}
  .steps li:last-child{border-bottom:none;}
  .steps li::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;left:0;top:12px;
    font-family:var(--mono);font-size:13px;letter-spacing:.05em;}
  .steps li.state-done::before{color:var(--green);}
  .steps li.state-done{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--text-3);}
  .steps li.state-now::before{color:var(--amber);}
  .steps li.state-now{color:var(--text);}
  .steps li.state-later::before{color:var(--text-3);}
  .steps li.state-later{color:var(--text-2);}
  .step-tag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
    padding:1px 6px;margin-left:8px;border:1px solid currentColor;vertical-align:middle;}
  .candidates{list-style:none;margin:0;padding:0;}
  .candidates li{padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);line-height:1.6;}
  .candidates li:last-child{border-bottom:none;}
  .tandem{font-size:14px;color:var(--text-2);line-height:1.65;background:var(--surface-2);border-left:2px solid var(--cyan);
    padding:14px 16px;margin-top:4px;}

  #nowStrip{flex:none;padding:16px 30px 22px;border-top:1px solid var(--border);position:relative;z-index:1;background:var(--bg);}
  #nowStrip .now-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin:0 0 12px;}
  .now-track{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
  .now-card{flex:none;width:230px;background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--amber);
    border-radius:6px;padding:12px 14px;cursor:pointer;transition:border-color .15s ease;}
  .now-card:hover{border-color:var(--gold-dim);}
  .now-card .nc-title{font-size:11px;color:var(--gold);font-family:var(--mono);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase;}
  .now-card .nc-text{font-size:13px;color:var(--text);line-height:1.45;}
  .now-empty{font-size:13px;color:var(--text-3);}
  .note{font-size:13px;color:var(--text-2);line-height:1.6;background:var(--surface-2);border-left:2px solid var(--amber);
    padding:14px 16px;margin-top:14px;}
  .question-box{border:1px dashed var(--cyan);padding:14px 16px;margin-top:14px;}
  .question-box .q-label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px;}
  .question-box .q-text{font-size:14px;color:var(--text);line-height:1.5;}
  .info-btn{position:absolute;top:24px;right:30px;}
  .about-btn{position:absolute;top:24px;right:30px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    color:var(--text-2);background:none;border:1px solid var(--border);padding:8px 14px;cursor:pointer;z-index:1;}
  .about-btn:hover{border-color:var(--gold-dim);color:var(--text);}
  .about-body{font-size:15px;line-height:1.75;color:var(--text);}
  .about-body p{margin:0 0 16px;}
  .qbox{margin-top:10px;}
  .qbox label{display:block;font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.04em;margin-bottom:8px;}
  .qbox textarea{width:100%;min-height:64px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    font-family:var(--sans);font-size:14px;padding:10px 12px;resize:vertical;}
  .qbox textarea:focus{outline:none;border-color:var(--gold-dim);}
  .qbox .hint2{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:6px;}
</style>
</head>
<body>
<div id="app">
  <div class="bg-grid"></div>
  <header>
    <p class="eyebrow">Project Dawn // NLG-AIOS</p>
    <h1>Topology</h1>
    <p class="sub">select a node to view purpose · connections · setup</p>
    <p class="sub" style="margin-top:2px;color:var(--text-3);font-size:10px;">content last updated Jul 12, 2026</p>
    <div class="overall-progress">
      <span class="sub" style="margin:0;">overall progress</span>
      <div class="op-track"><div class="op-fill" id="opFill"></div></div>
      <span class="op-pct" id="opPct">0%</span>
    </div>
    <button class="back info-btn" onclick="openInfo()">about this map</button>
  </header>
  <div id="stage">
    <svg id="map" role="img" aria-label="Hub and spoke topology of NLG AI implementation"></svg>
    <button class="reset-view" onclick="fitToContainer(true)">reset view</button>
    <div class="milestone-rail left" id="railLeft"></div>
    <div class="milestone-rail right" id="railRight"></div>
    <div class="map-footer">
      <div class="legend">
        <span><i class="dot" style="background:var(--green)"></i>active</span>
        <span><i class="dot" style="background:var(--amber)"></i>in research</span>
        <span><i class="dot" style="background:var(--cyan)"></i>proposed</span>
        <span><i class="dot" style="background:var(--gray)"></i>not started</span>
      </div>
      <div class="hint">drag to pan &middot; pinch or scroll to zoom &middot; tap a node</div>
    </div>
  </div>
  <div id="milestoneStrip">
    <p class="now-label">milestones</p>
    <div id="milestoneTrack" class="milestone-track"></div>
  </div>
  <div id="nowStrip">
    <p class="now-label">in progress right now</p>
    <div id="nowTrack" class="now-track"></div>
  </div>
  <div id="overlay" onclick="closeDetail()"></div>
  <div id="detail">
    <div class="corner tl"></div><div class="corner bl"></div>
    <button class="back" onclick="closeDetail()">&#8592; back to topology</button>
    <div id="detailBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const HUB = window.NLG_DATA.hub;
const ASPECTS = window.NLG_DATA.aspects;

const COLOR = { active:"#5FD98A", research:"#F2B84B", proposed:"#4FD1C5", "not-started":"#6B7378" };
const DIM   = { active:"#1E3A2B", research:"#4A3B1E", proposed:"#1E3A3A", "not-started":"#2A2F33" };
const LABEL = { active:"active", research:"in research", proposed:"proposed", "not-started":"not started" };

const svg = document.getElementById("map");
const cx=340, cy=330, hubR=65, nodeR=200, boxW=132, boxH=52;
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs){ const e=document.createElementNS(NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

// ---- Pan / zoom controller: fixed 680x660 canvas, scaled and panned via CSS transform ----
const view = { x:0, y:0, scale:1, base:1 };
function applyView(){ svg.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`; }
function fitToContainer(){
  const stage = document.getElementById("stage");
  const w = stage.clientWidth, h = stage.clientHeight;
  const s = Math.min(w/680, h/660) * 0.94;
  view.base = s; view.scale = s;
  view.x = (w - 680*s)/2; view.y = (h - 660*s)/2;
  applyView();
}
(function setupPanZoom(){
  const stage = document.getElementById("stage");
  let dragging=false, moved=false, startX=0, startY=0, startVX=0, startVY=0;
  const pointers = new Map();
  let pinchStartDist=0, pinchStartScale=1;

  stage.addEventListener("pointerdown", e=>{
    stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(pointers.size === 1){
      dragging = true; moved = false;
      startX = e.clientX; startY = e.clientY;
      startVX = view.x; startVY = view.y;
      stage.classList.add("panning");
    } else if(pointers.size === 2){
      dragging = false;
      const pts = [...pointers.values()];
      pinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      pinchStartScale = view.scale;
    }
  });
  stage.addEventListener("pointermove", e=>{
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(pointers.size === 2){
      const pts = [...pointers.values()];
      const dist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      const factor = dist / (pinchStartDist || dist);
      const newScale = Math.min(Math.max(pinchStartScale*factor, view.base*0.6), view.base*3.5);
      const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
      const rect = stage.getBoundingClientRect();
      const localX = midX-rect.left, localY = midY-rect.top;
      view.x = localX - (localX-view.x)*(newScale/view.scale);
      view.y = localY - (localY-view.y)*(newScale/view.scale);
      view.scale = newScale;
      applyView();
    } else if(dragging){
      const dx = e.clientX-startX, dy = e.clientY-startY;
      if(Math.hypot(dx,dy) > 5) moved = true;
      view.x = startVX+dx; view.y = startVY+dy;
      applyView();
    }
  });
  function endPointer(e){
    pointers.delete(e.pointerId);
    if(pointers.size === 0){ dragging=false; stage.classList.remove("panning"); }
  }
  stage.addEventListener("pointerup", endPointer);
  stage.addEventListener("pointercancel", endPointer);
  stage.addEventListener("click", e=>{
    if(moved){ e.stopPropagation(); e.preventDefault(); moved=false; }
  }, true);
  stage.addEventListener("wheel", e=>{
    e.preventDefault();
    const rect = stage.getBoundingClientRect();
    const localX = e.clientX-rect.left, localY = e.clientY-rect.top;
    const factor = Math.exp(-e.deltaY*0.0015);
    const newScale = Math.min(Math.max(view.scale*factor, view.base*0.6), view.base*3.5);
    view.x = localX - (localX-view.x)*(newScale/view.scale);
    view.y = localY - (localY-view.y)*(newScale/view.scale);
    view.scale = newScale;
    applyView();
  }, { passive:false });
})();

function render(){
  svg.setAttribute("viewBox", "0 0 680 660");
  svg.innerHTML = "";
  const defs = el("defs");
  defs.innerHTML = '<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#232A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>';
  svg.appendChild(defs);

  ASPECTS.forEach(a=>{
    const rad = a.angle * Math.PI/180;
    a._cx = cx + nodeR*Math.cos(rad); a._cy = cy + nodeR*Math.sin(rad);
    const hx = cx + hubR*Math.cos(rad), hy = cy + hubR*Math.sin(rad);
    svg.appendChild(el("line",{x1:hx,y1:hy,x2:a._cx,y2:a._cy,class:"spoke-line","marker-end":"url(#arrow)"}));
  });

  const hub = el("g",{class:"hub-group hub-glow", tabindex:"0", role:"button", "aria-label":"Claude central hub"});
  hub.addEventListener("click",(e)=>{ pulseAt(e.clientX, e.clientY, "#D4AF37"); openHub(); });
  hub.addEventListener("keypress",(e)=>{ if(e.key==="Enter") openHub(); });
  hub.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${hubR}" fill="#181D22" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#E8ECEE" font-family="Georgia,serif">Claude</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#4FD1C5" font-family="monospace">central hub</text>`;
  svg.appendChild(hub);

  ASPECTS.forEach(a=>{
    const g = el("g",{class:"node", style:`color:${COLOR[a.status]}`, tabindex:"0", role:"button", "aria-label":a.name});
    g.addEventListener("click",(e)=>{ pulseAt(e.clientX, e.clientY, COLOR[a.status]); openDetail(a.id); });
    g.addEventListener("keypress",(e)=>{ if(e.key==="Enter") openDetail(a.id); });
    const x = a._cx-boxW/2, y = a._cy-boxH/2;
    const done = a.steps.filter(s=>s.state==="done").length;
    const total = a.steps.length;
    g.innerHTML = `<rect x="${x}" y="${y}" width="${boxW}" height="${boxH}" rx="7" fill="${DIM[a.status]}" stroke="${COLOR[a.status]}" stroke-width="1"/>
      <text x="${a._cx}" y="${a._cy-10}" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#E8ECEE" font-family="-apple-system,sans-serif">${a.name}</text>
      <text x="${a._cx}" y="${a._cy+11}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="${COLOR[a.status]}" font-family="monospace" letter-spacing="0.03em">${LABEL[a.status]} ${done}/${total}</text>`;
    svg.appendChild(g);
  });
}

function connList(arr){ return `<ul class="conn-list">${arr.map(c=>`<li>${c}</li>`).join("")}</ul>`; }
function stepList(arr){
  const tagText = {done:"done", now:"in progress", later:"later"};
  return `<ol class="steps">${arr.map(s=>`<li class="state-${s.state}">${s.text}<span class="step-tag">${tagText[s.state]}</span></li>`).join("")}</ol>`;
}
function questionBox(q){ return q ? `<div class="question-box"><span class="q-label">open question</span><span class="q-text">${q}</span></div>` : ""; }
function optionsList(arr){ return arr ? `<p class="d-section-label">Candidate tools</p><ul class="candidates">${arr.map(o=>`<li>${o}</li>`).join("")}</ul>` : ""; }
function tandemBox(t){ return t ? `<p class="d-section-label">How they would work in tandem</p><div class="tandem">${t}</div>` : ""; }

function openInfo(){
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:#4FD1C5;border-color:#4FD1C5">reference</span>
    <h2 class="d-title">About this map</h2>
    <p class="purpose">This shows how the AI side of the business connects together. Claude sits at the center as the coordinating point. Each spoke around it represents one function of the business, marketing, finance, brokerage, property management, and so on.</p>
    <p class="d-section-label">Reading the colors</p>
    <ul class="conn-list">
      <li>Green: active and running today</li>
      <li>Amber: tool confirmed in use, connection still being worked out</li>
      <li>Cyan: candidate tools proposed, nothing chosen or started yet</li>
      <li>Gray: not started, no candidates identified yet</li>
    </ul>
    <p class="d-section-label">Reading a node</p>
    <ul class="conn-list">
      <li>Purpose: what this piece is meant to do</li>
      <li>Candidate tools: real options under consideration, with trade-offs, where nothing is decided yet</li>
      <li>How they would work in tandem: the chain of handoffs between tools and Claude</li>
      <li>Connections needed: what has to be linked or authorized for it to work</li>
      <li>Setup steps: the literal sequence to get there, each tagged done, in progress, or later</li>
      <li>Open question: a spot where the actual answer is still needed</li>
    </ul>
    <p class="d-section-label">Feedback</p>
    <p class="purpose">If something here does not match how a process actually works day to day, or a tool is missing, that is exactly the kind of correction this map needs.</p>
  `;
  document.getElementById("detail").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
}

function openHub(){
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:${COLOR.active};border-color:${COLOR.active}">${LABEL.active}</span>
    <h2 class="d-title">${HUB.name}</h2>
    <div class="d-row"><b>tool</b>${HUB.tool}</div>
    <p class="d-section-label">Purpose</p>
    <p class="purpose">${HUB.purpose}</p>
    <p class="d-section-label">Connections needed</p>
    ${connList(HUB.connections)}
    <p class="d-section-label">Setup steps</p>
    ${stepList(HUB.steps)}
    ${questionBox(HUB.question)}
  `;
  document.getElementById("detail").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
}

function openDetail(id){
  const a = ASPECTS.find(x=>x.id===id);
  const body = document.getElementById("detailBody");
  body.innerHTML = `
    <span class="d-badge" style="color:${COLOR[a.status]};border-color:${COLOR[a.status]}">${LABEL[a.status]}</span>
    <h2 class="d-title">${a.name}</h2>
    <div class="d-row"><b>tool</b>${a.tool}</div>
    <p class="d-section-label">Purpose</p>
    <p class="purpose">${a.purpose}</p>
    ${optionsList(a.options)}
    ${tandemBox(a.tandem)}
    <p class="d-section-label">Connections needed</p>
    ${connList(a.connections)}
    <p class="d-section-label">Setup steps</p>
    ${stepList(a.steps)}
    ${a.note ? `<p class="d-section-label">Note</p><div class="note">${a.note}</div>` : ""}
    ${questionBox(a.question)}
  `;
  document.getElementById("detail").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("stage").classList.add("dimmed");
}
function closeDetail(){
  document.getElementById("detail").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("stage").classList.remove("dimmed");
}

function renderNowStrip(){
  const track = document.getElementById("nowTrack");
  const items = [];
  HUB.steps.filter(s=>s.state==="now").forEach(s=>items.push({label:"Claude", text:s.text, action:()=>openHub()}));
  ASPECTS.forEach(a=>{
    a.steps.filter(s=>s.state==="now").forEach(s=>items.push({label:a.name, text:s.text, action:()=>openDetail(a.id)}));
  });
  if(items.length === 0){
    track.innerHTML = `<p class="now-empty">Nothing actively in progress right now.</p>`;
    return;
  }
  track.innerHTML = "";
  items.forEach(it=>{
    const card = document.createElement("div");
    card.className = "now-card";
    card.innerHTML = `<div class="nc-title">${it.label}</div><div class="nc-text">${it.text}</div>`;
    card.addEventListener("click", it.action);
    track.appendChild(card);
  });
}

// ---- Milestones: grouped rollups of the same done/now/later step data ----
const MILESTONES = [
  { label:"Foundation", ids:["__hub__","marketing"] },
  { label:"Financial Operations", ids:["finance"] },
  { label:"Client & Brokerage Systems", ids:["brokerage","clientexp"] },
  { label:"Internal Operations", ids:["propmgmt","hr","legal"] },
  { label:"Executive Visibility", ids:["executive"] },
];
function stepsFor(id){ return id === "__hub__" ? HUB.steps : ASPECTS.find(a=>a.id===id).steps; }
function tallyIds(ids){
  let done=0, total=0;
  ids.forEach(id=>{ const steps = stepsFor(id); total += steps.length; done += steps.filter(s=>s.state==="done").length; });
  return {done, total};
}
function ringSVG(pct, colorVar){
  const r=20, c=2*Math.PI*r;
  const offset = c * (1 - pct/100);
  return `<svg class="milestone-ring" width="52" height="52" viewBox="0 0 52 52">
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--border)" stroke-width="4"/>
    <circle class="ring-fill" cx="26" cy="26" r="${r}" fill="none" stroke="${colorVar}" stroke-width="4"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
      transform="rotate(-90 26 26)" data-target="${offset}"/>
  </svg>`;
}
function milestoneCardHTML(m){
  const {done,total} = tallyIds(m.ids);
  const pct = total ? Math.round((done/total)*100) : 0;
  return `<div class="milestone-card">
    ${ringSVG(pct, "var(--gold)")}
    <div class="milestone-info">
      <div class="m-label">${m.label}</div>
      <span class="m-pct">${pct}%</span><span class="m-frac">${done}/${total}</span>
    </div>
  </div>`;
}
function animateRingsAndCounters(container){
  container.querySelectorAll(".ring-fill").forEach(ring=>{
    const target = parseFloat(ring.dataset.target);
    requestAnimationFrame(()=>{ ring.style.transition = "stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)"; ring.style.strokeDashoffset = target; });
  });
}
function renderMilestones(){
  const left = [MILESTONES[0], MILESTONES[1]];
  const right = [MILESTONES[2], MILESTONES[3], MILESTONES[4]];
  document.getElementById("railLeft").innerHTML = left.map(milestoneCardHTML).join("");
  document.getElementById("railRight").innerHTML = right.map(milestoneCardHTML).join("");
  document.getElementById("milestoneTrack").innerHTML = MILESTONES.map(milestoneCardHTML).join("");
  animateRingsAndCounters(document.getElementById("railLeft"));
  animateRingsAndCounters(document.getElementById("railRight"));
  animateRingsAndCounters(document.getElementById("milestoneTrack"));

  let done=0, total=0;
  [HUB.steps, ...ASPECTS.map(a=>a.steps)].forEach(steps=>{ total+=steps.length; done+=steps.filter(s=>s.state==="done").length; });
  const overallPct = total ? Math.round((done/total)*100) : 0;
  requestAnimationFrame(()=>{ document.getElementById("opFill").style.width = overallPct+"%"; });
  let shown=0;
  const counter = setInterval(()=>{
    shown = Math.min(shown+2, overallPct);
    document.getElementById("opPct").textContent = shown+"%";
    if(shown>=overallPct) clearInterval(counter);
  }, 20);
}

// ---- Node click pulse: a small burst right where the click happened ----
function pulseAt(clientX, clientY, color){
  const stage = document.getElementById("stage");
  const rect = stage.getBoundingClientRect();
  const p = document.createElement("div");
  p.className = "node-pulse";
  p.style.left = (clientX-rect.left-22)+"px";
  p.style.top = (clientY-rect.top-22)+"px";
  p.style.width = "44px"; p.style.height = "44px";
  p.style.borderColor = color;
  stage.appendChild(p);
  setTimeout(()=>p.remove(), 600);
}

render();
renderNowStrip();
renderMilestones();
fitToContainer();
let resizeTimer;
window.addEventListener("resize", ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitToContainer, 150);
});
</script>
